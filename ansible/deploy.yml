---
- name: YNOV TP 2 deployment
  hosts: all
  become: true
  vars:
    apps_dir: /var/www/html/olympic-games
    nginx_port: 8080
    ssl_enabled: false
    cache_no_store: true
    cache_duration: "3600"

  tasks:
    - name: Installer Nginx et mettre à jour le cache apt
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Créer le répertoire pour l'application Angular
      ansible.builtin.file:
        path: "{{ apps_dir }}"
        state: directory
        mode: '0755'

    - name: Copier les fichiers de l'application Angular
      ansible.builtin.copy:
        src: app/olympic-games-starter/
        dest: "{{ apps_dir }}/"
        mode: '0644'

    - name: Générer le fichier de configuration Nginx depuis le template Jinja2
      ansible.builtin.template:
        src: nginx/app.conf.j2
        dest: /etc/nginx/sites-available/olympic-games.conf
        mode: '0644'
      notify: Redémarrer Nginx

    - name: Activer le site dans sites-enabled
      ansible.builtin.file:
        src: /etc/nginx/sites-available/olympic-games.conf
        dest: /etc/nginx/sites-enabled/olympic-games.conf
        state: link

    - name: Désactiver le site par défaut de Nginx
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Redémarrer Nginx

    - name: S'assurer que Nginx est démarré et persiste dans Docker
      ansible.builtin.command: nginx
      changed_when: true

  handlers:
    - name: Redémarrer Nginx
      ansible.builtin.command: nginx -s reload
      changed_when: true
